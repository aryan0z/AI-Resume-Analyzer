# Server Configuration
spring.application.name=AI Resume Analyzer
server.port=9090
spring.mvc.servlet.path=/

# Thymeleaf Configuration

spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenRouter API Configuration
openrouter.api.key=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
openrouter.api.model=meta-llama/llama-3.1-8b-instruct:free

# Logging
logging.level.root=INFO
logging.level.com.resumeanalyzer=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# PDF Processing
pdf.max.pages=50
