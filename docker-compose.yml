version: "3.8"

services:
  ai-resume-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-resume-analyzer
    ports:
      - "9090:9090"
    environment:
      - SPRING_APPLICATION_NAME=AI Resume Analyzer
      - SERVER_PORT=9090
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-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}
      - OPENROUTER_API_MODEL=${OPENROUTER_API_MODEL:-meta-llama/llama-3.1-8b-instruct:free}
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    restart: unless-stopped

  # Optional: Add PostgreSQL for future data persistence
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: resume-analyzer-db
  #   environment:
  #     POSTGRES_DB: resume_analyzer
  #     POSTGRES_USER: admin
  #     POSTGRES_PASSWORD: secure_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - app-network
  #   restart: unless-stopped

  # Optional: Add Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: resume-analyzer-cache
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - app-network
  #   restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:

# Usage:
# Set API key: export OPENROUTER_API_KEY=your_key_here
# Start services: docker-compose up -d
# View logs: docker-compose logs -f
# Stop services: docker-compose down
